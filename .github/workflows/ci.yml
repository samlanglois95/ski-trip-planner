name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  client:
    name: Client — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  server:
    name: Server — install & syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      # No build/test step yet — at least fail on syntax errors in any source file.
      - run: find src -name '*.js' -print0 | xargs -0 -n1 node --check
