name: Keep API warm

# Render's free tier spins the API down after ~15 min idle, so the next visitor
# eats a 60-90s cold start (often a 502 mid-boot) — the "trip wouldn't plan"
# failure new users hit. Ping /health every ~10 min to keep the backend warm.
# Runs on the default branch once merged. Notes: GitHub cron is best-effort
# (can be delayed) and is auto-paused after ~60 days of no repo activity.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (waits through a cold boot, so it actually warms it)
        run: |
          curl -fsS --max-time 90 https://ski-trip-planner-api.onrender.com/health \
            && echo "API is awake" \
            || echo "Ping failed (cold boot or down) — next run will retry"
